apiVersion: apps/v1
kind: Rollout
metadata:
  name: frontend-rollout
spec:
  replicas: 1
  strategy:
    canary:
      canaryService: frontend-service
      stableService: frontend-service
      trafficRouting:
        nginx:
          stableIngress: rollouts-frontend-stable
      steps:
      - setWeight: 5
      - pause: {}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: frontend-deployment
  template:
    metadata:
      labels:
        app: frontend-deployment
    spec:
      containers:
        - name: app
          image: argoproj/rollouts-demo:blue
          ports:
          - name: http
            containerPort: 8080
            protocol: TCP


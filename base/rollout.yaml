apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-rollout
spec:
  replicas: 1
  strategy:
    canary:
      canaryService: frontend-service-canary
      stableService: frontend-service-stable
      trafficRouting:
        nginx:
          stableIngress: rollouts-frontend-stable
      steps:
      - setWeight: 5
      - pause: {}
  revisionHistoryLimit: 2
  selector:
    matchLabels:
      app: frontend-rollout
  template:
    metadata:
      labels:
        app: frontend-rollout
    spec:
      containers:
        - name: app
          image: argoproj/rollouts-demo:blue
          ports:
          - name: http
          resources:
            requests:
              cpu: "250m"      
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"          
            containerPort: 8080
            protocol: TCP


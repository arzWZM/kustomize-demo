apiVersion: argoproj.io/v1alpha1
kind: Rollout
metadata:
  name: frontend-rollout
spec:
  template:
    spec:
      containers:
        - name: app
          image: argoproj/rollouts-demo:green
          resources:
            requests:
              cpu: "250m"      
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "256Mi"          
            containerPort: 8080
            protocol: TCP
